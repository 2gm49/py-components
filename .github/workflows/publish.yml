name: Publish Python Package

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    environment: pypi

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools (isolated)
        run: |
          python -Im ensurepip --upgrade
          python -Im pip install --upgrade pip setuptools wheel
          python -Im pip install build

      - name: Build package
        run: python -Im build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1